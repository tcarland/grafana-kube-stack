---
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: prom-auth-filter
  namespace: istio-system
spec:
  workloadSelector:
    labels:
      istio: ingressgateway
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
        routeConfiguration:
          vhost:
            name: "$(PROMETHEUS_DOMAINNAME):443"
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            inlineCode: |
              function envoy_on_request(request_handle)
                local auth_header = request_handle:headers():get("authorization")
                if auth_header == nil then
                  request_handle:respond(
                    { [":status"] = "401",
                      ["www-authenticate"] = 'Basic realm="restricted"' },
                    "Unauthorized"
                  )
                  return
                end

                -- Load expected auth from secret
                local expected = request_handle:secret("prom-auth"):get("auth")

                -- Strip "Basic " prefix
                local token = string.gsub(auth_header, "Basic ", "")

                if token ~= expected then
                  request_handle:respond(
                    { [":status"] = "401",
                      ["www-authenticate"] = 'Basic realm="restricted"' },
                    "Unauthorized"
                  )
                end
              end
