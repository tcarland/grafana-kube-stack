---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

helmCharts:
- name: kube-prometheus-stack
  includeCRDs: false
  releaseName: prometheus
  namespace: monitoring
  version: 70.3.0
  repo: https://prometheus-community.github.io/helm-charts
  valuesFile: prom-values.yaml
  valuesInline:
    prometheusOperator:
      nodeSelector:
        node-role.kubernetes.io/worker: ""
    prometheus:
      service:
        type: NodePort
        nodePort: 30500
    alertmanager:
      alertmanagerSpec:
        nodeSelector:
          node-role.kubernetes.io/worker: ""
      service:
        type: NodePort
        nodePort: 30400
    grafana:
      adminPassword: admin
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      service:
        type: LoadBalancer
        nodePort: 30200
      persistence:
        enabled: true
        size: 4Gi
