global:
  imageRegistry: ""

crds:
  enabled: false

prometheusOperator:
  nodeSelector:
    node-role.kubernetes.io/worker: ""

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
    enableFeatures:
      - metadata-wal-records
      - delayed-compaction
    remoteWrite:
      - url: http://mimir-distributor.monitoring.svc.cluster.local:8080/api/v1/push
        headers:
          X-Scope-OrgID: ${GRAFANA_ENV}

alertmanager:
  alertmanagerSpec:
    nodeSelector:
      node-role.kubernetes.io/worker: ""

grafana:
  admin:
    existingSecret: "grafana-admin"
    userKey: admin-user
    passwordKey: admin-password
  nodeSelector:
    node-role.kubernetes.io/worker: ""
  persistence:
    enabled: true
    size: 4Gi
