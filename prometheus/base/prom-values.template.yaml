global:
  imageRegistry: ""

crds:
  enabled: false

prometheusOperator:
  nodeSelector:
    node-role.kubernetes.io/worker: ""

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

prometheus:
  #service:
    #type: NodePort
    #nodePort: 30500
  prometheusSpec:
    remoteWrite:
    - url: http://mimir-distributor.monitoring.svc.cluster.local:8080/api/v1/push
      headers:
        X-Scope-OrgID: ${GRAFANA_ENV}

alertmanager:
  alertmanagerSpec:
    nodeSelector:
      node-role.kubernetes.io/worker: ""
  #service:
    #type: NodePort
    #nodePort: 30400

grafana:
  adminPassword: admin
  nodeSelector:
    node-role.kubernetes.io/worker: ""
  #service:
    #type: NodePort
    #nodePort: 30200
  persistence:
    enabled: true
    size: 4Gi
