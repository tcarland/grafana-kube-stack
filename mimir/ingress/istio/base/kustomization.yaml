apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
  - mimir-virtualservice.yaml
  - mimir-gateway.yaml

configMapGenerator:
  - name: mimir-istio-params
    envs:
      - params.env
      
secretGenerator:
  - name: mimir-tls
    namespace: istio-system
    behavior: create
    type: "kubernetes.io/tls"
    files:
      - tls.crt=mimir.crt
      - tls.key=mimir.key
      
generatorOptions:
  disableNameSuffixHash: true

replacements:
  - source:
      fieldPath: data.MIMIR_DOMAINNAME
      kind: ConfigMap
      name: loki-istio-params
      version: v1
    targets:
      - select:
          name: loki-gateway
          kind: Gateway
        fieldPaths:
          - spec.servers.*.hosts.0
      - select:
          name: loki-vs
          kind: VirtualService
        fieldPaths:
          - spec.hosts.0
  - source:
      fieldPath: data.ingress_namespace
      kind: ConfigMap
      name: mimir-istio-params
      version: v1
    targets:
      - select:
          name: loki-tls
          kind: Secret
        fieldPaths:
          - metadata.namespace

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/component: loki-ingress
      app.kubernetes.io/name: loki-istio-ingress
      app.kubernetes.io/part-of: grafana-kube-stack
      app.kubernetes.io/version: v26.01.20
      kustomize.component: loki-ingress
