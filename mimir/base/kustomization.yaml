---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources: []

secretGenerator:
  - name: mimir-s3-credentials
    envs:
      - secrets.env

helmCharts:
  - name: mimir-distributed
    includeCRDs: true
    releaseName: mimir
    namespace: monitoring
    version: 6.0.6
    repo: https://grafana.github.io/helm-charts
    valuesFile: mimir-values.yaml
    additionalValuesFiles:
      - mimir-structuredConfig.yaml
      - mimir-runtimeConfig.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: grafana-kube-stack
      kustomize.component: mimir
