mimir:
  structuredConfig:
    alertmanager_storage:
      s3:
        bucket_name: mimir-${GRAFANA_ENV}-alertmanager
        endpoint: ${S3_ENDPOINT}
        access_key_id: ${S3_ACCESS_KEY}
        secret_access_key: ${S3_SECRET_KEY}
        http:
          insecure_skip_verify: ${S3_SKIP_VERIFY}
    blocks_storage:
      backend: s3
      s3:
        bucket_name: mimir-${GRAFANA_ENV}-blocks
        endpoint: ${S3_ENDPOINT}
        access_key_id: ${S3_ACCESS_KEY}
        secret_access_key: ${S3_SECRET_KEY}
        http:
          insecure_skip_verify: ${S3_SKIP_VERIFY}
    ruler_storage:
      s3:
        bucket_name: mimir-${GRAFANA_ENV}-ruler
        endpoint: ${S3_ENDPOINT}
        access_key_id: ${S3_ACCESS_KEY}
        secret_access_key: ${S3_SECRET_KEY}
        http:
          insecure_skip_verify: ${S3_SKIP_VERFIY}
    #tenant_federation:
    #  enabled: true
