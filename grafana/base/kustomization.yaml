---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources: 
  - ../dashboards/kubernetes
  - ../dashboards/trino 

secretGenerator:
  - name: grafana-admin
    envs:
      - secrets.env

generatorOptions:
  disableNameSuffixHash: true
  
helmCharts:
  - name: grafana
    includeCRDs: false
    releaseName: grafana
    namespace: monitoring
    version: 10.1.2
    repo: https://grafana.github.io/helm-charts
    valuesFile: grafana-values.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/component: grafana
      app.kubernetes.io/name: grafana
      app.kubernetes.io/part-of: grafana-kube-stack
      app.kubernetes.io/version: v26.01.15
      kustomize.component: grafana
