---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources: []

configMapGenerator:
  - name: dashboard-k8s
    files:
      - k8s.json=dashboards/k8s_15661_rev2.json
    options:
      labels:
        grafana_dashboard: "1"

secretGenerator:
  - name: grafana-admin
    envs:
      - secrets.env

generatorOptions:
  disableNameSuffixHash: true
  
helmCharts:
  - name: grafana
    includeCRDs: false
    releaseName: grafana
    namespace: monitoring
    version: 10.1.2
    repo: https://grafana.github.io/helm-charts
    valuesFile: grafana-values.yaml
