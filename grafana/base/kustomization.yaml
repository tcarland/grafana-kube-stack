secretGenerator:
  - name: grafana-admin
    envs:
      - secrets.env

generatorOptions:
  disableNameSuffixHash: true
  
helmCharts:
  - name: grafana
    includeCRDs: false
    releaseName: grafana
    namespace: monitoring
    version: 10.1.2
    repo: https://grafana.github.io/helm-charts
    valuesFile: grafana-values.yaml
