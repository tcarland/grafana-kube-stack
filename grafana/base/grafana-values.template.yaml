replicas: 1

image:
  registry: docker.io
  repository: grafana/grafana
  tag: 12.4.3
admin:
  existingSecret: "grafana-admin"
  userKey: admin-user
  passwordKey: admin-password
nodeSelector:
  node-role.kubernetes.io/worker: ""
persistence:
  enabled: true
  size: 4Gi
ingress:
  enabled: false

grafana.ini:
  analytics:
    reporting_enabled: false
    check_for_updates: false
  database:
    url: postgres://${GRAFANA_ADMIN_USER}:${GRAFANA_ADMIN_PASSWORD}@postgresdb.monitoring.svc.cluster.local:5432/${GRAFANA_DB_NAME}?sslmode=disable
    #type: postgres
    #host: postgresdb.monitoring.svc.cluster.local:5432
    #name: ${GRAFANA_DB_NAME}
    #user: ${GRAFANA_ADMIN_USER}
    #password: ${GRAFANA_ADMIN_PASSWORD}
    ssl_mode: disable 
    max_idle_conn: 10
    max_open_conn: 100
    #conn_max_lifetime: 14400
initChownData:
  enabled: false
  image:
    registry: docker.io
    tag: "1.37.0"
    repository: library/busybox

sidecar:
  image:
    registry: quay.io
    repository: kiwigrid/k8s-sidecar
    tag: 2.7.3
  dashboards:
    enabled: true
    defaultFolderName: "Kubernetes"
    label: grafana_dashboard
    labelValue: "1"
    folderAnnotation: grafana_folder
    searchNamespace: ALL
    provider:
      allowUiUpdates: true
      foldersFromFilesStructure: true
  #dashboards:
  #  enabled: true
  #  label: grafana_dashboard
  #  labelValue: "1"
  #  # Allow discovery in all namespaces for dashboards
  #  searchNamespace: "${GRAFANA_NAMESPACE}"
  #  # Support for new table panels, when enabled grafana auto migrates the old table panels to newer table panels
  #  enableNewTablePanelSyntax: false
  #  annotations: {}
  #  multicluster:
  #    global:
  #      enabled: false
  #    etcd:
  #      enabled: false
  #  provider:
  #    allowUiUpdates: true
  #    foldersFromFilesStructure: true
  #datasources:
  #  enabled: true
  #  defaultDatasourceEnabled: true
  #  isDefaultDatasource: true
  #  name: Prometheus
  #  uid: prometheus
  #  url: http://prometheus-server.monitoring.svc.cluster.local:8080

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Mimir
        type: prometheus
        access: proxy
        url: http://mimir-query-frontend.monitoring.svc.cluster.local:8080/prometheus
        editable: false
        isDefault: true
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "${GRAFANA_ENV}"
      - name: loki
        type: loki
        access: proxy
        url: http://loki-query-frontend.monitoring.svc.cluster.local:3100
        editable: false
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "${GRAFANA_ENV}"
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo-query-frontend.monitoring.svc.cluster.local:3200
        editable: false
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "${GRAFANA_ENV}"

