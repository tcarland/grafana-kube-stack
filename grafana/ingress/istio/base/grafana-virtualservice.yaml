---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: grafana-vs
  namespace: $(namespace)
spec:
  gateways:
  - grafana-gateway
  hosts:
  - "$GRAFANA_DOMAINNAME"
  http:
  - headers:
      request:
        set:
          X-Forwarded-Proto: https
    match:
    - uri:
        prefix: /
    name: grafana
    route:
    - destination:
        host: grafana.monitoring.svc.cluster.local
        port:
          number: 80
