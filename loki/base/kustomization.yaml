---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources: []

generatorOptions:
  disableNameSuffixHash: true

helmCharts:
- name: loki
  includeCRDs: true
  releaseName: loki
  namespace: monitoring
  version: 6.44.0
  repo: https://grafana.github.io/helm-charts
  valuesFile: loki-values.yaml
  #additionalValuesFiles:
  #  - gel-values.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/component: loki-distributed
      app.kubernetes.io/name: loki
      app.kubernetes.io/part-of: grafana-kube-stack
      app.kubernetes.io/version: v26.01.05
      kustomize.component: loki
