loki:
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage_config:
    aws:
      region: ${S3_REGION}
      bucketnames: loki-${GRAFANA_ENV}-chunk
      s3forcepathstyle: true

  pattern_ingester:
      enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 672h # 28 days retention
  querier:
    max_concurrent: 4

  storage:
    type: s3
    bucketNames:
        chunks: loki-${GRAFANA_ENV}-chunk
        ruler: loki-${GRAFANA_ENV}-ruler
        admin: s3-loki-${GRAFANA_ENV}-admin
    s3:
      # s3 URL can be used to specify the endpoint, access key, secret key, and bucket name this works well for S3 compatible storages or if you are hosting Loki on-premises and want to use S3 as the storage backend. Either use the s3 URL or the individual fields below (AWS endpoint, region, secret).
      #s3: s3://access_key:secret_access_key@custom_endpoint/bucket_name
      # AWS endpoint URL
      endpoint: ${S3_ENDPOINT}
      region: ${S3_REGION}
      secretAccessKey: ${S3_SECRET_KEY}
      accessKeyId: ${S3_ACCESS_KEY}
      signatureVersion: v4
      s3ForcePathStyle: true
      insecure: false
      http_config: {}

deploymentMode: SimpleScalable

backend:
  replicas: 3
read:
  replicas: 3
write:
  replicas: 3
compactor:
  replicas: 1

gateway:
  enabled: false

minio:
  enabled: false
