---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources: []

generatorOptions:
  disableNameSuffixHash: true

helmCharts:
- name: tempo-distributed
  includeCRDs: true
  releaseName: tempo
  namespace: monitoring
  version: 1.52.2
  repo: https://grafana.github.io/helm-charts
  valuesFile: tempo-values.yaml

