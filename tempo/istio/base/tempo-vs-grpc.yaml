---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: tempo-vs-grpc
  namespace: $(namespace)
spec:
  gateways:
  - tempo-gateway
  hosts:
  - "$(TEMPO_DOMAINNAME)"
  http:
  - headers:
      request:
        set:
          X-Forwarded-Proto: https
    match:
    - port: 4317
    route:
    - destination:
        host: tempo-distributor.monitoring.svc.cluster.local
        port:
          number: 4317
