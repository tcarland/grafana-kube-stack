---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: tempo-gateway
  namespace: $(namespace)
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      name: https
      number: 443
      protocol: HTTPS
    hosts:
      - "$(TEMPO_DOMAINNAME)"
    tls:
      mode: SIMPLE
      credentialName: tempo-tls
  - port:
      name: grpc-otlp
      number: 4317
      protocol: HTTPS
    hosts:
      - "$(TEMPO_DOMAINNAME)"
    tls:
      mode: SIMPLE
      credentialName: tempo-tls
