---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

generatorOptions:
  disableNameSuffixHash: true

helmCharts:
  - name: alloy-operator
    includeCRDs: true
    releaseName: alloy-operator
    namespace: monitoring
    version: 0.5.2
    repo: https://grafana.github.io/helm-charts
  